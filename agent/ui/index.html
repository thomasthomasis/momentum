<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Momentum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── AUTH VIEW ──────────────────────────────────────────────────────── -->
  <div id="view-auth" class="view">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" width="26" height="26">
        <rect width="24" height="24" rx="5.28" fill="#6366f1"/>
        <path d="M12.62 5.8 6.42 13.24H12l-.62 4.96 6.2-7.44H12l.62-4.96z" fill="#fff"/>
      </svg>
      <span class="brand-name">Momentum</span>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="pairing">Pairing code</button>
      <button class="tab-btn" data-tab="password">Email &amp; password</button>
    </div>

    <form id="form-pairing" class="auth-form">
      <div class="field">
        <label for="pairing-code">Code from the web app's user menu</label>
        <input type="text" id="pairing-code" placeholder="XXXX-XXXX" required autocomplete="off">
      </div>
      <p class="form-error" id="pairing-error"></p>
      <button type="submit" class="btn btn-primary btn-full">Link this device</button>
    </form>

    <form id="form-password" class="auth-form hidden">
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <p class="form-error" id="password-error"></p>
      <button type="submit" class="btn btn-primary btn-full">Sign in</button>
    </form>

    <p class="auth-hint">
      Generate a pairing code from your Momentum dashboard: your avatar (top right) → <strong>Link desktop agent</strong>.
    </p>
  </div>

  <!-- ── HOME VIEW (signed in, no session) ──────────────────────────────── -->
  <div id="view-home" class="view hidden">
    <div class="view-header">
      <div class="view-header-left">
        <div class="avatar" id="home-avatar"></div>
        <span class="user-name" id="home-name"></span>
      </div>
      <div class="view-header-actions">
        <button class="icon-btn icon-btn-danger" id="btn-logout" title="Sign out">⏻</button>
      </div>
    </div>

    <form id="form-session">
      <div class="field">
        <label for="session-title">What are you working on?</label>
        <input type="text" id="session-title" placeholder="Session title" required>
      </div>
      <div class="field">
        <label for="session-project">Project</label>
        <select id="session-project"></select>
      </div>
      <div class="field">
        <label>Energy level</label>
        <div class="energy-picker" id="energy-picker"></div>
      </div>
      <p class="form-error" id="session-error"></p>
      <button type="submit" class="btn btn-primary btn-full">Start session</button>
    </form>
  </div>

  <!-- ── SESSION VIEW (active session) ─────────────────────────────────── -->
  <div id="view-session" class="view hidden">
    <div class="session-header">
      <div class="session-info">
        <div class="session-title-display" id="active-title"></div>
        <div class="session-project-display" id="active-project"></div>
      </div>
    </div>

    <div class="timer-wrap">
      <div class="timer" id="timer">00:00:00</div>
      <div class="timer-status hidden" id="timer-status">⏸ Paused</div>
    </div>

    <div class="current-site-wrap">
      <span class="site-icon">▸</span>
      <span class="site-domain" id="current-app">—</span>
    </div>

    <div class="session-controls" id="session-controls">
      <button class="btn btn-ghost btn-half" id="btn-pause">Pause</button>
      <button class="btn btn-danger btn-half" id="btn-stop">Stop</button>
    </div>

    <!-- Stop confirmation panel -->
    <div class="stop-panel hidden" id="stop-panel">
      <div class="stop-panel-title">Ending session</div>
      <div class="field">
        <label>How was your energy?</label>
        <div class="energy-picker" id="stop-energy-picker"></div>
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="stop-shipped">
        <span>🚀 Shipped something?</span>
      </label>
      <div class="stop-actions">
        <button class="btn btn-ghost" id="btn-stop-cancel">Cancel</button>
        <button class="btn btn-primary" id="btn-stop-confirm">Save &amp; stop</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
