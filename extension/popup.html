<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Momentum</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── AUTH VIEW ──────────────────────────────────────────────────────── -->
  <div id="view-auth" class="view">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9" stroke="var(--accent)" stroke-width="2"/>
        <polyline points="8 12 11 15 16 9" stroke="var(--accent)" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">Momentum</span>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login">Sign in</button>
      <button class="tab-btn" data-tab="register">Create account</button>
    </div>

    <form id="form-login" class="auth-form">
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com"
          required autocomplete="email">
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••"
          required autocomplete="current-password">
      </div>
      <p class="form-error" id="login-error"></p>
      <button type="submit" class="btn btn-primary btn-full">Sign in</button>
    </form>

    <form id="form-register" class="auth-form hidden">
      <div class="field">
        <label for="reg-name">Name</label>
        <input type="text" id="reg-name" placeholder="Your name"
          required autocomplete="name">
      </div>
      <div class="field">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com"
          required autocomplete="email">
      </div>
      <div class="field">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min 8 characters"
          required autocomplete="new-password">
      </div>
      <p class="form-error" id="reg-error"></p>
      <button type="submit" class="btn btn-primary btn-full">Create account</button>
    </form>

    <button class="open-web-link" data-open-web>Open Momentum dashboard ↗</button>
  </div>

  <!-- ── HOME VIEW (signed in, no session) ──────────────────────────────── -->
  <div id="view-home" class="view hidden">
    <div class="view-header">
      <div class="view-header-left">
        <div class="avatar" id="home-avatar"></div>
        <span class="user-name" id="home-name"></span>
      </div>
      <div class="view-header-actions">
        <button class="icon-btn" data-open-web title="Open dashboard" data-icon="externalLink"></button>
        <button class="icon-btn icon-btn-danger" id="btn-logout" title="Sign out" data-icon="logout"></button>
      </div>
    </div>

    <form id="form-session">
      <div class="field">
        <label for="session-title">What are you working on?</label>
        <input type="text" id="session-title" placeholder="Session title" required>
      </div>
      <div class="field">
        <label for="session-project">Project</label>
        <select id="session-project">
          <option value="">No project</option>
        </select>
      </div>
      <div class="field">
        <label>Energy level</label>
        <div class="energy-picker" id="energy-picker"></div>
      </div>
      <p class="form-error" id="session-error"></p>
      <button type="submit" class="btn btn-primary btn-full">Start session</button>
    </form>
  </div>

  <!-- ── SESSION VIEW (active session) ─────────────────────────────────── -->
  <div id="view-session" class="view hidden">
    <div class="session-header">
      <div class="session-info">
        <div class="session-title-display" id="active-title"></div>
        <div class="session-project-display" id="active-project"></div>
      </div>
      <button class="icon-btn" data-open-web title="Open dashboard" data-icon="externalLink"></button>
    </div>

    <div class="timer-wrap">
      <div class="timer" id="timer">00:00:00</div>
      <div class="timer-status hidden" id="timer-status">⏸ Paused</div>
    </div>

    <div class="current-site-wrap">
      <span class="site-icon" data-icon="globe"></span>
      <span class="site-domain" id="current-site-domain">—</span>
    </div>

    <div class="session-controls" id="session-controls">
      <button class="btn btn-ghost btn-half" id="btn-pause">Pause</button>
      <button class="btn btn-danger btn-half" id="btn-stop">Stop</button>
    </div>

    <!-- Stop confirmation panel -->
    <div class="stop-panel hidden" id="stop-panel">
      <div class="stop-panel-title">Ending session</div>
      <div class="field">
        <label>How was your energy?</label>
        <div class="energy-picker" id="stop-energy-picker"></div>
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="stop-shipped">
        <span class="shipped-label"><span data-icon="rocket"></span> Shipped something?</span>
      </label>
      <div class="stop-actions">
        <button class="btn btn-ghost" id="btn-stop-cancel">Cancel</button>
        <button class="btn btn-primary" id="btn-stop-confirm">Save &amp; stop</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="icons.js"></script>
  <script src="popup.js"></script>
</body>
</html>
